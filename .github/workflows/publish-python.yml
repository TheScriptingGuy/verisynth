name: Publish verisynth (Python) to PyPI

# Publishes the pure-Python `verisynth` distribution (sdist + universal wheel)
# to PyPI when a GitHub Release is published. Authentication uses PyPI Trusted
# Publishing (OIDC) — no API token or password is stored in the repository.

on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: verisynth-python-dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: verisynth-python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
